# Orwion POS — nginx reverse proxy (pos.orwion.com)
# Kurulum:
#   sudo cp deploy/nginx-pos.orwion.com.conf /etc/nginx/sites-available/pos.orwion.com
#   sudo ln -s /etc/nginx/sites-available/pos.orwion.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Cloudflare önde (proxied) olduğundan TLS'i Cloudflare sonlandırır;
# origin 80'de kalabilir. İstersen certbot ile origin TLS de eklenebilir.

server {
    listen 80;
    listen [::]:80;
    server_name pos.orwion.com;

    # Cloudflare gerçek ziyaretçi IP'si (opsiyonel ama önerilir)
    # set_real_ip_from 0.0.0.0/0;
    # real_ip_header CF-Connecting-IP;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Statik varlıklar için uzun cache
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3100;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
